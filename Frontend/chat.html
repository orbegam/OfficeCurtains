<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtains Chat</title>
    <link rel="stylesheet" href="css/credits_style.css">
    <link rel="icon" type="image/svg+xml" href="Images/favicon.ico">
    <style>
        .page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 4rem);
        }

        .tab-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tab-button {
            flex: 1;
            padding: 0.75rem 1.5rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            background: var(--card-bg, #ffffff);
            color: #6b7280;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .tab-button:hover:not(.active) {
            border-color: #2563eb;
            color: #2563eb;
        }

        .dark-mode .tab-button {
            background: #1f2937;
            border-color: #4b5563;
            color: #9ca3af;
        }

        .dark-mode .tab-button.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* Public Chat Section */
        .chat-section {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 14rem);
        }

        .section-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .section-header h2 {
            color: #2563eb;
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .section-header p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .dark-mode .section-header h2 {
            color: #60a5fa;
        }

        .dark-mode .section-header p {
            color: #9ca3af;
        }

        .chat-messages {
            flex: 1;
            background: var(--card-bg, #ffffff);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .dark-mode .chat-messages {
            background: #1f2937;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            background: #f3f4f6;
            border-left: 3px solid #d1d5db;
        }

        .dark-mode .message {
            background: #374151;
            border-left-color: #4b5563;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .message-username {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .message-text {
            color: #374151;
            line-height: 1.5;
        }

        .dark-mode .message-text {
            color: #d1d5db;
        }

        /* Premium user styling */
        .message.premium {
            border-left-color: #10b981;
            background: linear-gradient(to right, #d1fae5 0%, #f3f4f6 10%);
        }

        .dark-mode .message.premium {
            background: linear-gradient(to right, #065f46 0%, #374151 10%);
        }

        .message.premium .message-text {
            color: #059669;
            font-weight: 500;
        }

        .dark-mode .message.premium .message-text {
            color: #34d399;
        }

        .message.premium .message-username {
            color: #059669;
        }

        .dark-mode .message.premium .message-username {
            color: #34d399;
        }

        .crown-icon {
            color: #f59e0b;
            font-size: 1rem;
        }

        .chat-input-container {
            background: var(--card-bg, #ffffff);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 0.75rem;
        }

        .dark-mode .chat-input-container {
            background: #1f2937;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .dark-mode .chat-input {
            background: #374151;
            border-color: #4b5563;
            color: white;
        }

        .chat-input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .dark-mode .chat-input:focus {
            border-color: #60a5fa;
        }

        .send-button {
            padding: 0.75rem 2rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .send-button:hover {
            background: #1d4ed8;
        }

        .send-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 2rem;
            font-style: italic;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--primary-color, #2563eb);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            transition: background 0.3s ease;
        }

        .back-button:hover {
            background: #1d4ed8;
        }

        /* Private Messages Section */
        .pm-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .pm-form {
            background: var(--card-bg, #ffffff);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .dark-mode .pm-form {
            background: #1f2937;
        }

        .pm-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #374151;
        }

        .dark-mode .pm-form label {
            color: #d1d5db;
        }

        .pm-form select,
        .pm-form textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.3s ease;
            font-family: inherit;
            box-sizing: border-box;
        }

        .dark-mode .pm-form select,
        .dark-mode .pm-form textarea {
            background: #374151;
            border-color: #4b5563;
            color: white;
        }

        .pm-form select:focus,
        .pm-form textarea:focus {
            outline: none;
            border-color: #2563eb;
        }

        .dark-mode .pm-form select:focus,
        .dark-mode .pm-form textarea:focus {
            border-color: #60a5fa;
        }

        .pm-form textarea {
            resize: vertical;
            min-height: 80px;
        }

        .pm-status {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            display: none;
            margin-top: 0.5rem;
        }

        .pm-status.success {
            display: block;
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .dark-mode .pm-status.success {
            background: #064e3b;
            color: #34d399;
        }

        .pm-status.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }

        .dark-mode .pm-status.error {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .pm-info {
            background: var(--card-bg, #ffffff);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            color: #6b7280;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .dark-mode .pm-info {
            background: #1f2937;
            color: #9ca3af;
        }

        .pm-info strong {
            color: #374151;
        }

        .dark-mode .pm-info strong {
            color: #d1d5db;
        }

        @media (max-width: 768px) {
            .page-container {
                padding: 1rem;
            }

            .chat-section {
                height: calc(100vh - 12rem);
            }

            .section-header h2 {
                font-size: 1.25rem;
            }

            .chat-messages {
                padding: 1rem;
            }

            .send-button {
                padding: 0.75rem 1rem;
            }

            .tab-button {
                font-size: 0.9rem;
                padding: 0.6rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <a href="/Frontend/index.html" class="back-button">
            ← Back to Control
        </a>

        <div class="tab-container">
            <button class="tab-button active" onclick="switchTab('public')">💬 Public Chat</button>
            <button class="tab-button" onclick="switchTab('private')">✉️ Private Messages</button>
        </div>

        <!-- Public Chat Tab -->
        <div class="tab-content active" id="tab-public">
            <div class="chat-section">
                <div class="section-header">
                    <h2>Public Chat</h2>
                    <p>Chat with other curtain controllers</p>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state">Loading messages...</div>
                </div>

                <div class="chat-input-container">
                    <input 
                        type="text" 
                        class="chat-input" 
                        id="messageInput" 
                        placeholder="Type your message..."
                        maxlength="500"
                    >
                    <button class="send-button" id="sendButton">Send</button>
                </div>
            </div>
        </div>

        <!-- Private Messages Tab -->
        <div class="tab-content" id="tab-private">
            <div class="pm-section">
                <div class="section-header">
                    <h2>✉️ Private Messages</h2>
                    <p>Send a private notification to another user</p>
                </div>

                <div class="pm-form">
                    <label for="pmRecipient">Recipient</label>
                    <select id="pmRecipient">
                        <option value="">Loading users...</option>
                    </select>

                    <label for="pmText">Message</label>
                    <textarea id="pmText" placeholder="Type your private message..." maxlength="500"></textarea>

                    <button class="send-button" id="pmSendButton" style="width: 100%;">Send Private Message</button>

                    <div class="pm-status" id="pmStatus"></div>
                </div>

                <div class="pm-info">
                    <strong>How it works:</strong> Private messages appear as notifications to the recipient the next time they use the app. Only the recipient can see the message.
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastMessageCount = 0;

        // ============== Tab Switching ==============
        function switchTab(tab) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');

            if (tab === 'private') {
                loadUsers();
            }
        }

        // ============== Public Chat ==============
        async function loadMessages() {
            try {
                const response = await fetch('/api/chat/messages', {
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error('Failed to load messages');
                }

                const data = await response.json();
                const messagesContainer = document.getElementById('chatMessages');

                if (data.messages.length === 0) {
                    messagesContainer.innerHTML = '<div class="empty-state">No messages yet. Be the first to say something!</div>';
                    return;
                }

                if (data.messages.length !== lastMessageCount) {
                    lastMessageCount = data.messages.length;
                    
                    messagesContainer.innerHTML = data.messages.map(msg => {
                        const messageTime = new Date(msg.timestamp).toLocaleTimeString([], { 
                            hour: '2-digit', 
                            minute: '2-digit' 
                        });

                        const premiumClass = msg.is_premium ? 'premium' : '';
                        const crownIcon = msg.is_premium ? '<span class="crown-icon">👑</span>' : '';

                        return `
                            <div class="message ${premiumClass}">
                                <div class="message-header">
                                    ${crownIcon}
                                    <span class="message-username">${escapeHtml(msg.username)}</span>
                                    <span class="message-time">${messageTime}</span>
                                </div>
                                <div class="message-text">${escapeHtml(msg.message)}</div>
                            </div>
                        `;
                    }).join('');

                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            const sendButton = document.getElementById('sendButton');
            sendButton.disabled = true;

            try {
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error('Failed to send message');
                }

                input.value = '';
                await loadMessages();
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Failed to send message. Please try again.');
            } finally {
                sendButton.disabled = false;
                input.focus();
            }
        }

        // ============== Private Messages ==============
        let usersLoaded = false;

        async function loadUsers() {
            if (usersLoaded) return;
            try {
                const response = await fetch('/api/users/list', {
                    credentials: 'include'
                });
                if (!response.ok) throw new Error('Failed to load users');
                const data = await response.json();
                const select = document.getElementById('pmRecipient');
                select.innerHTML = '<option value="">-- Select a user --</option>' +
                    data.users.map(u => `<option value="${escapeHtml(u)}">${escapeHtml(u)}</option>`).join('');
                usersLoaded = true;
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('pmRecipient').innerHTML = '<option value="">Failed to load users</option>';
            }
        }

        async function sendPrivateMessage() {
            const recipient = document.getElementById('pmRecipient').value;
            const text = document.getElementById('pmText').value.trim();
            const statusEl = document.getElementById('pmStatus');
            const sendBtn = document.getElementById('pmSendButton');

            statusEl.className = 'pm-status';
            statusEl.style.display = 'none';

            if (!recipient) {
                statusEl.textContent = 'Please select a recipient.';
                statusEl.className = 'pm-status error';
                return;
            }
            if (!text) {
                statusEl.textContent = 'Please enter a message.';
                statusEl.className = 'pm-status error';
                return;
            }

            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/messages/send', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: recipient, text: text })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to send message');
                }

                statusEl.textContent = `Message sent to ${recipient}!`;
                statusEl.className = 'pm-status success';
                document.getElementById('pmText').value = '';
            } catch (error) {
                statusEl.textContent = error.message;
                statusEl.className = 'pm-status error';
            } finally {
                sendBtn.disabled = false;
            }
        }

        // ============== Utilities ==============
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============== Event Listeners ==============
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        document.getElementById('pmSendButton').addEventListener('click', sendPrivateMessage);

        // Load public chat on page load
        loadMessages();
        setInterval(loadMessages, 3000);

        // Apply dark mode if set
        const isDarkMode = localStorage.getItem('dark-mode') === 'true';
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
